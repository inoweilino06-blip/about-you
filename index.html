<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About You - The 1975</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        body {
            background-color: #1a1a1a; /* Tema gelap estetik seperti tautan rujukan */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .main-card {
            background: #262626;
            display: flex;
            flex-direction: row;
            width: 100%;
            max-width: 780px;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            align-items: center;
            gap: 35px;
            border: 1px solid #333;
        }

        /* --- SISI KIRI: PEMUTAR MUSIK --- */
        .music-player {
            flex: 1;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 14px;
            filter: grayscale(100%) contrast(105%);
            margin-bottom: 20px;
        }

        .music-info h3 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .music-info p {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 25px;
        }

        .progress-container {
            width: 100%;
            margin-bottom: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #444;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .progress-current {
            width: 0%;
            height: 100%;
            background: #ffffff;
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 8px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            color: #fff;
            font-size: 20px;
        }

        .play-btn {
            background: #ffffff;
            color: #121212;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        /* --- SISI KANAN: SLIDESHOW & LIRIK --- */
        .gallery-section {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .photo-frame {
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 20px;
            overflow: hidden;
            background: #1e1e1e;
            margin-bottom: 25px;
            border: 1px solid #333;
            position: relative;
        }

        .gallery-photo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(110%);
            opacity: 0;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
            transform: scale(1.03);
        }

        .gallery-photo.active {
            opacity: 1;
            transform: scale(1);
        }

        .lyrics {
            font-style: italic;
            font-size: 19px;
            color: #e0e0e0;
            text-align: center;
            min-height: 60px;
            line-height: 1.5;
            padding: 0 10px;
        }

        @media (max-width: 650px) {
            .main-card {
                flex-direction: column;
                padding: 20px;
                gap: 25px;
            }
            .music-player {
                width: 100%;
            }
            .photo-frame {
                aspect-ratio: 1/1;
            }
        }
    </style>
</head>
<body>

    <!-- File audio instrumen/lagu About You -->
    <audio id="bg-music" src="https://frequent-bronze-my96yglc.edgeone.dev/lv_0_20260719141745.mp3" loop></audio>

    <div class="main-card">
        <!-- SISI KIRI -->
        <div class="music-player">
            <img src="https://cdn.phototourl.com/free/2026-07-19-af147316-3a98-4cb6-b488-0e7522917fc4.jpg" alt="Cover" class="album-art">
            <div class="music-info">
                <h3>About You</h3>
                <p>The 1975</p>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-current" id="progress-current"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
            <div class="controls">
                <span style="cursor:pointer; opacity:0.5;">⏮</span>
                <div class="play-btn" id="play-btn">▶</div>
                <span style="cursor:pointer; opacity:0.5;">⏭</span>
            </div>
        </div>

        <!-- SISI KANAN -->
        <div class="gallery-section">
            <div class="photo-frame">
                <img id="img-0" src="https://raspy-cyan-cao2zbxv.edgeone.dev/724207467_18000228350976805_9084788824386053621_n..jpg" class="gallery-photo active">
                <img id="img-1" src="https://cdn.phototourl.com/free/2026-07-19-8eddecc3-8b07-4694-87f4-aa0023612128.jpg" class="gallery-photo">
                <img id="img-2" src="https://cdn.phototourl.com/free/2026-07-19-8566470a-dec4-4908-8c61-aee9a13bc796.jpg" class="gallery-photo">
                <img id="img-3" src="https://cdn.phototourl.com/free/2026-07-19-1b8ebb2e-03f4-4e73-a03b-a60c1679dba8.jpg" class="gallery-photo">
                <img id="img-4" src="https://cdn.phototourl.com/free/2026-07-19-190f22a9-5da3-459a-ba2a-1898fa5ee0c1.jpg" class="gallery-photo">
                <img id="img-5" src="https://cdn.phototourl.com/free/2026-07-19-115cca12-798c-4263-a617-d813aefdbf3b.jpg" class="gallery-photo">
            </div>
            <div class="lyrics" id="lyric-text">I..</div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-btn');
        const progressCurrent = document.getElementById('progress-current');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const lyricText = document.getElementById('lyric-text');

        // Penyesuaian milidetik ketukan lagu agar pergantian gambar bertepatan dengan mulainya lirik
        const lyricTimeline = [
            { time: 0, text: "I..", imgIndex: 0 },
            { time: 3.2, text: "know a place...", imgIndex: 1 },
            { time: 9.8, text: "It's somewhere I go when I need to remember your face...", imgIndex: 2 },
            { time: 19.2, text: "We get married...", imgIndex: 3 },
            { time: 23.9, text: "In our heads.", imgIndex: 4 },
            { time: 29.8, text: "Something to do while we try to recall how we met.", imgIndex: 0 },
            { time: 40.2, text: "Do you think I have forgotten?", imgIndex: 5 },
            { time: 54.8, text: "About you?", imgIndex: 0 }
        ];

        function formatTime(secs) {
            let min = Math.floor(secs / 60);
            let sec = Math.floor(secs % 60);
            if (sec < 10) sec = `0${sec}`;
            return `${min}:${sec}`;
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = '🩶';
            } else {
                audio.pause();
                playBtn.innerText = '▶';
            }
        });

        audio.addEventListener('timeupdate', () => {
            const progressPercent = (audio.currentTime / audio.duration) * 100;
            progressCurrent.style.width = `${progressPercent}%`;
            currentTimeEl.innerText = formatTime(audio.currentTime);

            const currentSec = audio.currentTime;
            let activeLine = lyricTimeline[0];

            for (let i = 0; i < lyricTimeline.length; i++) {
                if (currentSec >= lyricTimeline[i].time) {
                    activeLine = lyricTimeline[i];
                }
            }

            if (lyricText.innerText !== activeLine.text) {
                lyricText.innerText = activeLine.text;
                
                // Transisi tumpuk-silang (cross-fade) dengan opacity posisi absolut
                document.querySelectorAll('.gallery-photo').forEach(img => img.classList.remove('active'));
                const nextImg = document.getElementById(`img-${activeLine.imgIndex}`);
                if (nextImg) nextImg.classList.add('active');
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.innerText = formatTime(audio.duration);
        });

        progressBar.addEventListener('click', (e) => {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });
    </script>
</body>
</html>
